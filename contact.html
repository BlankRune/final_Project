<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main class="content">
        <nav class="navbar custom-navbar px-5">
            <div class="logo">MyPortfolio</div>
        
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
        
        <section class="contact container mt-5">
            <h2 class="mb-4">Contact Me</h2>
        
            <form class="contact-form">
        
                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>
        
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email">
                </div>
        
                <div class="mb-3">
                    <label>Message</label>
                    <textarea class="form-control" rows="5" placeholder="Your message"></textarea>
                </div>
        
                <button type="button" onclick="window.location.href='success.html'" class="btn btn-primary">
                    Send Message
                </button>
        
            </form>
        </section>
    </main>
    <footer class="footer text-center mt-5 p-3">
        <p>© 2026 J.C. Portfolio</p>
    </footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/script.js"></script>
</body>
</html>
